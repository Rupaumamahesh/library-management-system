# ─────────────────────────────────────────────
#  Library Management System — application.properties
#  Owner: Sandali (Database & Integration Lead)
# ─────────────────────────────────────────────

# ── Server ──────────────────────────────────
server.port=8080

# ── MySQL DataSource ─────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=library_user
spring.datasource.password=library_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────
# 'validate' means Hibernate checks the schema but does NOT modify it.
# Flyway owns all schema changes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Flyway ───────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

